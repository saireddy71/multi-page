<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <defs>
    <linearGradient id="cherryGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff99cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cherryGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc0d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb3d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stemGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d7a1f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stem -->
  <path d="M 100 140 Q 97 165 94 200" stroke="url(#stemGrad3)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Leaves -->
  <ellipse cx="75" cy="165" rx="11" ry="17" fill="#2d5016" transform="rotate(-45 75 165)"/>
  <ellipse cx="125" cy="175" rx="11" ry="17" fill="#3d7a1f" transform="rotate(45 125 175)"/>
  
  <!-- Outer petals -->
  <ellipse cx="100" cy="55" rx="16" ry="24" fill="url(#cherryGrad1)" opacity="0.9" transform="rotate(0 100 55)"/>
  <ellipse cx="100" cy="55" rx="16" ry="24" fill="url(#cherryGrad1)" opacity="0.85" transform="rotate(72 100 55)"/>
  <ellipse cx="100" cy="55" rx="16" ry="24" fill="url(#cherryGrad1)" opacity="0.8" transform="rotate(144 100 55)"/>
  <ellipse cx="100" cy="55" rx="16" ry="24" fill="url(#cherryGrad1)" opacity="0.85" transform="rotate(216 100 55)"/>
  <ellipse cx="100" cy="55" rx="16" ry="24" fill="url(#cherryGrad1)" opacity="0.9" transform="rotate(288 100 55)"/>
  
  <!-- Inner petals -->
  <ellipse cx="100" cy="70" rx="14" ry="20" fill="url(#cherryGrad2)" opacity="0.95" transform="rotate(36 100 70)"/>
  <ellipse cx="100" cy="70" rx="14" ry="20" fill="url(#cherryGrad2)" opacity="0.9" transform="rotate(108 100 70)"/>
  <ellipse cx="100" cy="70" rx="14" ry="20" fill="url(#cherryGrad2)" opacity="0.95" transform="rotate(180 100 70)"/>
  <ellipse cx="100" cy="70" rx="14" ry="20" fill="url(#cherryGrad2)" opacity="0.9" transform="rotate(252 100 70)"/>
  <ellipse cx="100" cy="70" rx="14" ry="20" fill="url(#cherryGrad2)" opacity="0.95" transform="rotate(324 100 70)"/>
  
  <!-- Center -->
  <circle cx="100" cy="85" r="8" fill="#fff0f5" opacity="0.95"/>
  <circle cx="100" cy="85" r="4" fill="#ffc0d9"/>
</svg>