<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <defs>
    <linearGradient id="sunGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb84d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b6f47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="stemGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d7a1f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stem -->
  <path d="M 100 130 Q 98 160 95 200" stroke="url(#stemGrad2)" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Leaves -->
  <ellipse cx="75" cy="160" rx="13" ry="20" fill="#2d5016" transform="rotate(-50 75 160)"/>
  <ellipse cx="125" cy="170" rx="13" ry="20" fill="#3d7a1f" transform="rotate(50 125 170)"/>
  
  <!-- Outer petals (orange) -->
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.9" transform="rotate(0 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.85" transform="rotate(45 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.8" transform="rotate(90 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.85" transform="rotate(135 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.9" transform="rotate(180 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.85" transform="rotate(225 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.8" transform="rotate(270 100 40)"/>
  <ellipse cx="100" cy="40" rx="14" ry="32" fill="url(#sunGrad2)" opacity="0.85" transform="rotate(315 100 40)"/>
  
  <!-- Middle petals (bright yellow) -->
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.95" transform="rotate(22.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.9" transform="rotate(67.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.95" transform="rotate(112.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.9" transform="rotate(157.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.95" transform="rotate(202.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.9" transform="rotate(247.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.95" transform="rotate(292.5 100 55)"/>
  <ellipse cx="100" cy="55" rx="12" ry="28" fill="url(#sunGrad1)" opacity="0.9" transform="rotate(337.5 100 55)"/>
  
  <!-- Center with texture -->
  <circle cx="100" cy="100" r="30" fill="url(#centerGrad)"/>
  
  <!-- Center details -->
  <circle cx="95" cy="95" r="3" fill="#8b7355" opacity="0.6"/>
  <circle cx="105" cy="105" r="3" fill="#8b7355" opacity="0.6"/>
  <circle cx="100" cy="110" r="2" fill="#8b7355" opacity="0.5"/>
  <circle cx="108" cy="98" r="2" fill="#8b7355" opacity="0.5"/>
</svg>