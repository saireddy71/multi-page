<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <defs>
    <linearGradient id="roseGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c71585;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roseGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff69b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1493;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d7a1f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stem -->
  <path d="M 100 140 Q 95 160 90 200" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Leaves -->
  <ellipse cx="80" cy="170" rx="12" ry="18" fill="#2d5016" transform="rotate(-45 80 170)"/>
  <ellipse cx="120" cy="180" rx="12" ry="18" fill="#3d7a1f" transform="rotate(45 120 180)"/>
  
  <!-- Outer petals (darkest) -->
  <circle cx="100" cy="50" r="28" fill="url(#roseGrad1)" opacity="0.9"/>
  <circle cx="130" cy="65" r="26" fill="url(#roseGrad1)" opacity="0.85"/>
  <circle cx="140" cy="95" r="25" fill="url(#roseGrad1)" opacity="0.8"/>
  <circle cx="130" cy="125" r="24" fill="url(#roseGrad1)" opacity="0.85"/>
  <circle cx="100" cy="135" r="26" fill="url(#roseGrad1)" opacity="0.9"/>
  <circle cx="70" cy="125" r="24" fill="url(#roseGrad1)" opacity="0.85"/>
  <circle cx="60" cy="95" r="25" fill="url(#roseGrad1)" opacity="0.8"/>
  <circle cx="70" cy="65" r="26" fill="url(#roseGrad1)" opacity="0.85"/>
  
  <!-- Middle petals -->
  <circle cx="115" cy="70" r="22" fill="url(#roseGrad2)" opacity="0.95"/>
  <circle cx="120" cy="100" r="21" fill="url(#roseGrad2)" opacity="0.9"/>
  <circle cx="100" cy="120" r="20" fill="url(#roseGrad2)" opacity="0.9"/>
  <circle cx="80" cy="100" r="21" fill="url(#roseGrad2)" opacity="0.9"/>
  <circle cx="85" cy="70" r="22" fill="url(#roseGrad2)" opacity="0.95"/>
  
  <!-- Inner petals (lightest) -->
  <circle cx="105" cy="85" r="16" fill="#ffb6d9" opacity="0.95"/>
  <circle cx="95" cy="105" r="15" fill="#ffc0db" opacity="0.9"/>
  <circle cx="100" cy="95" r="14" fill="#ffd0e0" opacity="0.95"/>
  <circle cx="110" cy="95" r="14" fill="#ffb6d9" opacity="0.9"/>
  
  <!-- Center -->
  <circle cx="100" cy="95" r="8" fill="#ffe0eb" opacity="0.95"/>
</svg>